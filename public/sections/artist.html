<script>
  function changeImageArt(imageUrl) {
    const imageElement = document.getElementById('image-art');
    imageElement.src = imageUrl;
  }

  function moveRandomly() {
    const gif = document.querySelector('.moving-gif');
    const maxX = window.innerWidth - gif.offsetWidth;
    const maxY = window.innerHeight - gif.offsetHeight;
    const x = Math.random() * maxX;
    const y = Math.random() * maxY;
    gif.style.left = `${x}px`;
    gif.style.top = `${y}px`;
  }

  setInterval(moveRandomly, 7000);

  function moveAscii9InOut() {
    const ascii9 = document.querySelector('.ascii9');
    ascii9.style.transform = 'translateX(20px) rotate(5deg)';
    setTimeout(() => {
      ascii9.style.transform = 'translateX(0px) rotate(0deg)';
    }, 3000);
  }

  function moveAsciiPaint() {
    const ascii9b = document.querySelector('.ascii9b');

    ascii9b.style.transform = 'translateX(0)';
    ascii9b.style.transition = 'transform 10s linear';

    setTimeout(() => {
      ascii9b.style.transform = 'translateX(150vw)';
    }, 10000);

    setTimeout(() => {
      ascii9b.style.transform = 'translateX(-100vw)';
      ascii9b.style.transition = 'none';
    }, 20000);

    setTimeout(() => {
      ascii9b.style.transition = 'transform 10s linear';
    }, 20200);
  }

  setInterval(moveAscii9InOut, 5000);
  setInterval(moveAsciiPaint, 22000);
</script>
