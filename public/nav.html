<nav class="section-nav" aria-label="Section navigation">
  <ul>
    <li><a href="#me" data-section="me">me</a></li>
    <li><a href="#devrel" data-section="devrel">devrel</a></li>
    <li><a href="#dev" data-section="dev">dev</a></li>
    <li><a href="#opensource" data-section="opensource">open source</a></li>
    <li><a href="#genderequity" data-section="genderequity">gender equity</a></li>
    <li><a href="#accessibility" data-section="accessibility">accessibility</a></li>
    <li><a href="#writing" data-section="writing">writing</a></li>
    <li><a href="#curator" data-section="curator">curator</a></li>
    <li><a href="#artist" data-section="artist">artist</a></li>
  </ul>
</nav>

<script>
  const navLinks = document.querySelectorAll('.section-nav a');

  function setActiveNav(id) {
    navLinks.forEach(link => {
      link.classList.toggle('active', link.dataset.section === id);
    });
  }

  const sectionObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) setActiveNav(entry.target.id);
    });
  }, { threshold: 0.5 });

  document.querySelectorAll('.section').forEach(s => sectionObserver.observe(s));

  navLinks.forEach(link => {
    link.addEventListener('click', (e) => {
      e.preventDefault();
      const target = document.getElementById(link.dataset.section);
      if (!target || isScrolling) return;
      const idx = Array.from(document.querySelectorAll('.section')).indexOf(target);
      if (idx === -1) return;
      currentSection = idx;
      isScrolling = true;
      target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      setTimeout(() => { isScrolling = false; }, 900);
    });
  });
</script>

<style>
  .section-nav {
    position: fixed;
    right: 1.5rem;
    top: 50%;
    transform: translateY(-50%);
    z-index: 100;
    background: rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    padding: 0.75rem 1.2rem;
    border-radius: 2rem;
    border: 1px solid rgba(255, 255, 255, 0.12);
  }

  .section-nav ul {
    list-style: none;
    margin: 0;

    display: flex;
    flex-direction: column;
    gap: 0.35rem;
    align-items: flex-end;
  }

  .section-nav a {
    font-size: 0.75rem;
    color: rgba(255, 255, 255, 0.6);
    display: block;
    text-align: right;
    letter-spacing: 0.03em;
    transition: color 0.2s ease, transform 0.2s ease;
  }

  .section-nav a:hover {
    color: #e0e664;
    text-decoration: none;
    transform: translateX(-4px);
  }

  .section-nav a.active {
    color: #f70de7;
    font-size: 0.9rem;
    text-shadow: 0 0 8px rgba(247, 13, 231, 0.55);
  }

  @media (max-width: 768px) {
    .section-nav {
      display: none;
    }
  }
</style>
